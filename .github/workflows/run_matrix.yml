name: Market Intelligence Engine
on:
  schedule:
    - cron: '30 21 * * 1-5'
    - cron: '0 22 * * 1-5'
    - cron: '0 0 * * 2-6'
    - cron: '0 4 * * 2-6'
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write # IMPORTANT: Allows the bot to save files
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

     - name: Execute Live Core Matrix Pipeline
        run: |
          # If your script is in a folder, move to it first
          # cd scripts/ 
          python main.py

     - name: Commit and Save Telemetry
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Debug: List the files so we can see what the runner actually sees
          ls -R market_engine_cache/
          
          # Only add if the file exists
          if [ -f "market_engine_cache/telemetry.csv" ]; then
            git add market_engine_cache/telemetry.csv
            git commit -m "Automated Telemetry Update: $(date)" || echo "No changes to commit"
            git push
          else
            echo "File not found! Skipping commit."
          fi
