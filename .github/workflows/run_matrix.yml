name: Execute Daily Market Matrix

on:
  schedule:
    - cron: '0 22 * * 1-5' # Runs automatically at 10 PM UTC every weekday (Mon-Fri)
  workflow_dispatch: # Allows you to trigger the run manually with a single click on GitHub

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants authorization to push updates back to the repo

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4 # Bumped from v3 to v4 for Node.js 24 support

    - name: Set up Python Environment
      uses: actions/setup-python@v5 # Bumped from v4 to v5 for Node.js 24 support
      with:
        python-version: '3.10'

    - name: Install Hardened Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Live Core Matrix Pipeline
      run: python main.py

    - name: Commit and Push Matrix Output Artifact
      run: |
        git config --global user.name 'GitHub Automation Engine'
        git config --global user.email 'actions@github.com'
        
        # 1. Fetch remote tracking branches immediately
        git fetch origin main
        
        # 2. Stage the newly calculated data matrix
        git add market_engine_cache/
        
        # 3. Commit only if differences exist
        if ! git diff-index --quiet HEAD; then
          git commit -m "Automated Telemetry Update: $(date +'%Y-%m-%d')"
          
          # 4. Pull remote changes, forcing our newly generated data to stack on top cleanly
          git pull --rebase -X theirs origin main
          
          # 5. Push up the synchronized history
          git push origin main
        else
          echo "No structural data shifts detected. Skipping routine write."
        fi
