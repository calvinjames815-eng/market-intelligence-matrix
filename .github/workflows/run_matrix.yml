name: Market Engine Pipeline
on:
  schedule:
    - cron: '0 0 * * 1'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Updated from @v3 to @v4
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Updated from @v4 to @v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Removed wbdata since we now use requests
          pip install pandas numpy requests
          
      - name: Run Engine
        run: python main.py
