name: Market Engine Pipeline
on:
  schedule:
    - cron: '0 0 * * 1'
  push:
    branches: [ main ]
  workflow_dispatch:

# ADD THIS PERMISSION BLOCK
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true # Ensures the token is used for git commands
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests
          
      - name: Run Engine
        run: python main.py

      - name: Commit changes
        run: | 
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Use -f to force add despite .gitignore
          git add -f macro_scorecard.csv market_engine_cache.csv
          
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update economic market metrics"
            git push
          fi
