name: Market Intelligence Engine
on:
  schedule:
    # Schedule targeting US Markets (NYSE) from Philippines (UTC+8)
    # Market Open: 9:30 AM EST = 9:30 PM PHT (UTC+8) -> cron: '30 21 * * 1-5'
    - cron: '30 21 * * 1-5' 
    # Mid-Day: 1:00 PM EST = 1:00 AM PHT (Next Day)
    - cron: '0 1 * * 2-6'
    # Market Close: 4:00 PM EST = 4:00 AM PHT (Next Day)
    - cron: '0 4 * * 2-6'
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Engine
        run: python main.py

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4 # Uses native Node.js 24 image

    - name: Set up Python Environment
      uses: actions/setup-python@v5 # Uses native Node.js 24 image
      with:
        python-version: '3.10'

    - name: Install Hardened Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Live Core Matrix Pipeline
      run: python main.py

    - name: Commit and Push Matrix Output Artifact
      run: |
        git config --global user.name 'GitHub Automation Engine'
        git config --global user.email 'actions@github.com'
        
        # 1. Fetch latest remote state immediately 
        git fetch origin main
        
        # 2. Update local tracking index BEFORE committing to prevent race conditions
        git pull --rebase origin main
        
        # 3. Stage your fresh CSV files
        git add market_engine_cache/
        
        # 4. Commit and push cleanly now that the timeline is perfectly aligned
        if ! git diff-index --quiet HEAD; then
          git commit -m "Automated Telemetry Update: $(date +'%Y-%m-%d')"
          git push origin main
        else
          echo "No structural data shifts detected. Skipping routine write."
        fi
