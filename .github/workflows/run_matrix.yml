name: Market Intelligence Engine

on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install yfinance numpy pandas requests

      - name: Cleanup Corrupted Cache
        run: rm -f market_engine_cache/telemetry.csv

      - name: Execute Live Core Matrix Pipeline
        run: python main.py

      - name: Display Historical Snapshot
        run: |
          python -c "
          import pandas as pd
          df = pd.read_csv('market_engine_cache/telemetry.csv')
          print(f'\n{'='*60}\nLATEST HISTORICAL SNAPSHOT (LAST 20 ENTRIES)\n{'='*60}')
          print(f'{'ENTERPRISE':<16} {'MOMENTUM':<12} {'STATUS':<10} {'P/E':<6} {'MARGIN'}')
          for _, row in df.tail(20).iterrows():
              print(f'{row['ENTERPRISE']:<16} {row['MOMENTUM']:<12} {row['STATUS']:<10} {row['P/E']:<6} {row['MARGIN']}')
          "

      - name: Commit and Save Telemetry
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          if [ -f "market_engine_cache/telemetry.csv" ]; then
            git add -f market_engine_cache/telemetry.csv
            git commit -m "Automated Telemetry Update: $(date)"
            git push
          else
            echo "::error::Telemetry file not found."
            exit 1
          fi
