name: Market Intelligence Engine
on:
  schedule:
    - cron: '30 21 * * 1-5'
    - cron: '0 22 * * 1-5'
    - cron: '0 0 * * 2-6'
    - cron: '0 4 * * 2-6'
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write # IMPORTANT: Allows the bot to save files
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Live Core Matrix Pipeline
        run: python main.py

      - name: Commit and Save Telemetry
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Force add the file even if git thinks it's clean
          git add -f market_engine_cache/telemetry.csv
          # Use a unique timestamp to force a commit
          git commit -m "Automated Telemetry Update: $(date)" || echo "No changes detected"
          git push
