name: Market Intelligence Engine

on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install yfinance numpy pandas requests

      - name: Execute Live Core Matrix Pipeline
        run: python main.py

      - name: Commit and Save Telemetry
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          if [ -f "market_engine_cache/telemetry.csv" ]; then
            # Use -f to force add the ignored file
            git add -f market_engine_cache/telemetry.csv
            git commit -m "Automated Telemetry Update: $(date)"
            git push
          else
            echo "Telemetry file not found."
            exit 1
          fi
