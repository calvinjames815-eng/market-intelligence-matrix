name: Market Intelligence Engine
on:
  schedule:
    - cron: '30 21 * * 1-5'
    - cron: '0 22 * * 1-5'
    - cron: '0 0 * * 2-6'
    - cron: '0 4 * * 2-6'
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write # IMPORTANT: Allows the bot to save files
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
      run: |
        pip install yfinance pandas numpy pandas-datareader

    - name: Execute Live Core Matrix Pipeline
      run: |
        # If your script is in a folder, move to it first
        # cd scripts/ 
        python main.py

    - name: Commit and Save Telemetry
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Only proceed if the file was actually generated
        if [ -f "market_engine_cache/telemetry.csv" ]; then
          git add market_engine_cache/telemetry.csv
          git commit -m "Automated Telemetry Update: $(date)"
          git push
        else
          echo "Telemetry file not found. Skipping commit."
          exit 0
        fi
