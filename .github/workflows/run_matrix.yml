name: Market Intelligence Engine
on:
  schedule:
    # NY Market Open (9:30 AM EST) -> 9:30 PM PHT
    - cron: '30 21 * * 1-5'
    # NY Market 10:00 AM EST -> 10:00 PM PHT
    - cron: '0 22 * * 1-5'
    # NY Market 12:00 PM EST -> 12:00 AM PHT (Next Day)
    - cron: '0 0 * * 2-6'
    # NY Market Close (4:00 PM EST) -> 4:00 AM PHT (Next Day)
    - cron: '0 4 * * 2-6'
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Hardened Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Live Core Matrix Pipeline
        run: python main.py

      - name: Commit and Push Matrix Output Artifact
        run: |
          git config --global user.name 'GitHub Automation Engine'
          git config --global user.email 'actions@github.com'
          
          # 1. Fetch and rebase to handle potential race conditions
          git fetch origin main
          git pull --rebase origin main
          
          # 2. Stage your fresh CSV files
          git add market_engine_cache/
          
          # 3. Commit and push only if there are changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "Automated Telemetry Update: $(date +'%Y-%m-%d')"
            git push origin main
          else
            echo "No structural data shifts detected. Skipping routine write."
          fi
