name: Execute Daily Market Matrix

on:
  schedule:
    - cron: '0 22 * * 1-5' # Runs automatically at 10 PM UTC every weekday (Mon-Fri)
  workflow_dispatch: # Allows you to trigger the run manually with a single click on GitHub

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants authorization to push updates back to the repo

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4 # Uses native Node.js 24 image

    - name: Set up Python Environment
      uses: actions/setup-python@v5 # Uses native Node.js 24 image
      with:
        python-version: '3.10'

    - name: Install Hardened Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Live Core Matrix Pipeline
      run: python main.py

    - name: Commit and Push Matrix Output Artifact
      run: |
        git config --global user.name 'GitHub Automation Engine'
        git config --global user.email 'actions@github.com'
        
        # 1. Fetch latest remote state immediately 
        git fetch origin main
        
        # 2. Update local tracking index BEFORE committing to prevent race conditions
        git pull --rebase origin main
        
        # 3. Stage your fresh CSV files
        git add market_engine_cache/
        
        # 4. Commit and push cleanly now that the timeline is perfectly aligned
        if ! git diff-index --quiet HEAD; then
          git commit -m "Automated Telemetry Update: $(date +'%Y-%m-%d')"
          git push origin main
        else
          echo "No structural data shifts detected. Skipping routine write."
        fi
