name: Market Intelligence Engine
on:
  schedule:
    - cron: '30 21 * * 1-5'
    - cron: '0 22 * * 1-5'
    - cron: '0 0 * * 2-6'
    - cron: '0 4 * * 2-6'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: # Add this block to explicitly allow writing
      contents: write
    steps:
      - uses: actions/checkout@v4
      
     - name: Install dependencies
      run: |
        pip install yfinance numpy pandas-datareader
        # Force a version of pandas that is compatible with pandas-datareader 0.10.0
        pip install "pandas<2.0.0"
          
      - name: Execute Live Core Matrix Pipeline
        run: python main.py
        
      - name: Commit and Save Telemetry
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          if [ -f "market_engine_cache/telemetry.csv" ]; then
            git add market_engine_cache/telemetry.csv
            git commit -m "Automated Telemetry Update: $(date)"
            git push
          else
            echo "Telemetry file not found. Skipping commit."
            exit 0
          fi
