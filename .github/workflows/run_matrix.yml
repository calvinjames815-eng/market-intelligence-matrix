name: Market Intelligence Engine
on:
  schedule:
    - cron: '30 21 * * 1-5'
    - cron: '0 22 * * 1-5'
    - cron: '0 0 * * 2-6'
    - cron: '0 4 * * 2-6'
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions: # Required to allow the bot to push to your repo
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Live Core Matrix Pipeline
        run: python main.py

      - name: Commit and Push Cache
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add market_engine_cache/
          # Only commit if there are changes to avoid empty commits
          git commit -m "Update cache: $(date)" || echo "No changes to commit"
          git push
